# HW3_B compose.yaml — local development.
# Brings up the API together with Qdrant and Postgres for end-to-end testing.
# Note: this is NOT the production stack (HW3_C is K8s). This is "make it run
# on my laptop" only.

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: qbc12-hw03-qdrant-local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: qbc12-hw03-postgres-local
    environment:
      POSTGRES_DB: qbc12_hw03_encoder
      POSTGRES_USER: qbc12_hw03_api_ro
      POSTGRES_PASSWORD: changeme_local_only
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qbc12-hw03-b-api-local
    depends_on:
      - qdrant
      - postgres
    env_file:
      - .env
    environment:
      BUNDLE_DIR: /app/bundle
      BUNDLE_DEVICE: cpu
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: qbc12_corpus
      DATABASE_URL: postgresql://qbc12_hw03_api_ro:changeme_local_only@postgres:5432/qbc12_hw03_encoder
      PORT: "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  qdrant_data:
  pg_data:
